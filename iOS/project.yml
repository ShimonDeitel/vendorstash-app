name: Vendorstash
options:
  bundleIdPrefix: com.shimondeitel.giftcardlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vendorstash:
    type: application
    platform: iOS
    sources:
      - path: Vendorstash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.giftcardlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vendorstash/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VendorstashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VendorstashTests
      - path: Vendorstash.storekit
    dependencies:
      - target: Vendorstash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.giftcardlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VendorstashUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VendorstashUITests
    dependencies:
      - target: Vendorstash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.giftcardlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vendorstash:
    build:
      targets:
        Vendorstash: all
        VendorstashTests: [test]
        VendorstashUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vendorstash.storekit
    test:
      config: Debug
      storeKitConfiguration: Vendorstash.storekit
      targets:
        - VendorstashTests
        - VendorstashUITests
    archive:
      config: Release
